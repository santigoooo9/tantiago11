<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text Portrait Effect</title>

<style>

/* ==========================================
   CONFIGURACIÓN GENERAL
   ========================================== */

/*
    Quitamos márgenes por defecto
    y hacemos que todo ocupe la pantalla.
*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:white;
    font-family:monospace;

    display:flex;
    flex-direction:column;
    align-items:center;

    min-height:100vh;
    background:#000;
}


/* ==========================================
   BOTÓN PARA SUBIR IMAGEN
   ========================================== */

.controls{
    margin-top:20px;
    margin-bottom:20px;
}

/*
   Canvas oculto.
   Lo usamos para leer los píxeles
   de la imagen cargada.
*/

canvas{
    display:none;
}


/* ==========================================
   CONTENEDOR DEL TEXTO
   ========================================== */

#portrait{

    white-space:pre;

    font-size:clamp(
1.8px,
0.42vw,
5px
);

    line-height:1.8px;

    letter-spacing:0px;

    font-weight:normal;

    overflow:auto;

    max-width:100vw;

    max-height:100vh;

    padding:15px;

    color:#d8b4fe;

    text-shadow:
    0 0 2px #d8b4fe,
    0 0 5px #c084fc,
    0 0 10px #9333ea,
    0 0 20px #7e22ce;

    background:#000;
}

</style>

</head>

<body>

<!-- ==========================================
     INPUT DE IMAGEN
     ========================================== -->

<div class="controls">

    <!--
         Aquí el usuario selecciona una imagen.
    -->

    <input type="file" id="imageInput" accept="image/*">

</div>


<!--
     Canvas oculto para procesar la imagen
-->

<canvas id="canvas"></canvas>


<!--
     Aquí aparecerá el retrato generado
-->

<pre id="portrait" class="holographic"></pre>


<script>

/* ==========================================
   ELEMENTOS DEL HTML
   ========================================== */

const imageInput = document.getElementById("imageInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const portrait = document.getElementById("portrait");


/* ==========================================
   CARACTERES DISPONIBLES
   ========================================== */

/*
   Más densidad = más detalle.

   Los caracteres más "gruesos"
   representan zonas oscuras.

   Los espacios representan zonas claras.
*/

/* ==================================================
   TEXTO PERSONALIZADO
================================================== */

const CUSTOM_TEXT = `
DIOS TE AMA SOFIA
`;


/* ==========================================
   AL CARGAR UNA IMAGEN
   ========================================== */

imageInput.addEventListener("change", function(event){

    const file = event.target.files[0];

    if(!file) return;

    const img = new Image();

    img.onload = function(){

        /*
            Reducimos tamaño para
            evitar millones de letras.
        */

        const width = 700;

        const height =
        img.height * (width / img.width);

        canvas.width = width;
        canvas.height = height;

        ctx.drawImage(
            img,
            0,
            0,
            width,
            height
        );

        generateTextPortrait();

    }

    img.src = URL.createObjectURL(file);

});


/* ==========================================
   GENERADOR DEL RETRATO
   ========================================== */

function generateTextPortrait(){

    const imageData =
    ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const pixels = imageData.data;

    let minBrightness = 255;
    let maxBrightness = 0;

    for(let i = 0; i < pixels.length; i += 4){

        const brightness =
        (
            pixels[i] +
            pixels[i+1] +
            pixels[i+2]
        ) / 3;

        if(brightness < minBrightness){
            minBrightness = brightness;
        }

        if(brightness > maxBrightness){
            maxBrightness = brightness;
        }

    }

    let result = "";
    let textIndex = 0;

    for(let y = 0; y < canvas.height; y += 1){

        for(
            let x = 0;
            x < canvas.width;
            x++
        ){

            const index =
            (y * canvas.width + x) * 4;

            const r = pixels[index];
            const g = pixels[index + 1];
            const b = pixels[index + 2];

            let brightness =
            (r + g + b) / 3;

            const range =
            Math.max(
                1,
                maxBrightness - minBrightness
            );

            brightness =
            (
                brightness - minBrightness
            ) / range;

            brightness *= 255;

            if(brightness < 20){

    result += " ";

}
else if(brightness < 60){

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

    result += " ";

}
else if(brightness < 120){

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

}
else{

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

} 

        }

        result += "\n";

    }

    portrait.textContent = result;

}

</script>

</body>
</html>
