<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text Portrait Effect</title>

<style>

/* ==========================================
   CONFIGURACIÓN GENERAL
   ========================================== */

/*
    Quitamos márgenes por defecto
    y hacemos que todo ocupe la pantalla.
*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:white;
    font-family:monospace;

    display:flex;
    flex-direction:column;
    align-items:center;

    min-height:100vh;
    background:#000;
}


/* ==========================================
   BOTÓN PARA SUBIR IMAGEN
   ========================================== */

.controls{
    margin-top:20px;
    margin-bottom:20px;
}

/*
   Canvas oculto.
   Lo usamos para leer los píxeles
   de la imagen cargada.
*/

canvas{
    display:none;
}


/* ==========================================
   CONTENEDOR DEL TEXTO
   ========================================== */

#portrait{

    white-space:pre;

    font-size:clamp(
1.8px,
0.42vw,
5px
);

    line-height:1.8px;

    letter-spacing:0px;

    font-weight:normal;

    overflow:auto;

    max-width:100vw;

    max-height:100vh;

    padding:15px;

    color:#d8b4fe;

    text-shadow:
    0 0 2px #d8b4fe,
    0 0 5px #c084fc,
    0 0 10px #9333ea,
    0 0 20px #7e22ce;

    background:#000;
}

</style>

</head>

<body>

<!-- ==========================================
     INPUT DE IMAGEN
     ========================================== -->

<div class="controls">

    <!--
         Aquí el usuario selecciona una imagen.
    -->

    <input type="file" id="imageInput" accept="image/*">

</div>


<!--
     Canvas oculto para procesar la imagen
-->

<canvas id="canvas"></canvas>


<!--
     Aquí aparecerá el retrato generado
-->

<pre id="portrait" class="holographic"></pre>


<script>

/* ==========================================
   ELEMENTOS DEL HTML
   ========================================== */

const imageInput = document.getElementById("imageInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const portrait = document.getElementById("portrait");


/* ==========================================
   CARACTERES DISPONIBLES
   ========================================== */

/*
   Más densidad = más detalle.

   Los caracteres más "gruesos"
   representan zonas oscuras.

   Los espacios representan zonas claras.
*/

/* ==================================================
   TEXTO PERSONALIZADO
================================================== */

const CUSTOM_TEXT = `
Bienaventurado el que confía en el Señor y no se aparta de su camino, porque en Él hay salvación y esperanza eterna. El amor es paciente y bondadoso, no busca lo suyo, no se irrita, todo lo soporta y todo lo espera, porque el verdadero amor viene de Dios. Cree en el Señor Jesucristo y serás salvo, porque por gracia somos salvos mediante la fe, no por obras para que nadie se gloríe.

La paz de Dios que sobrepasa todo entendimiento guardará tu corazón y tus pensamientos en Cristo Jesús. No temas porque Yo estoy contigo, no desmayes porque Yo soy tu Dios que te esfuerzo. Todo lo puedo en Cristo que me fortalece, porque el Señor es mi luz y mi salvación, ¿de quién temeré?

Clama a mí y Yo te responderé, busca y hallarás, llama y se te abrirá. Orad sin cesar y en todo dad gracias, porque esta es la voluntad de Dios. El que permanece en Cristo lleva fruto, porque separados de Él nada podemos hacer.

El sabio teme al Señor y se aparta del mal, porque el principio de la sabiduría es el temor de Dios. Transformaos por medio de la renovación de vuestro entendimiento para que comprobéis la buena voluntad de Dios. Si alguno está en Cristo nueva criatura es, las cosas viejas pasaron, todas son hechas nuevas.

Porque Yo sé los planes que tengo para vosotros, planes de paz y no de mal, para daros un futuro y una esperanza. Los que esperan en el Señor renovarán sus fuerzas, correrán y no se cansarán, caminarán y no se fatigarán. Nada podrá separarnos del amor de Dios que es en Cristo Jesús Señor nuestro.

Dios es amor, y el que permanece en amor permanece en Dios. Y Él enjugará toda lágrima de los ojos, y ya no habrá muerte, ni llanto, ni dolor. La palabra del Señor permanece para siempre y su verdad no tiene fin.
`;


/* ==========================================
   AL CARGAR UNA IMAGEN
   ========================================== */

imageInput.addEventListener("change", function(event){

    const file = event.target.files[0];

    if(!file) return;

    const img = new Image();

    img.onload = function(){

        /*
            Reducimos tamaño para
            evitar millones de letras.
        */

        const width = 700;

        const height =
        img.height * (width / img.width);

        canvas.width = width;
        canvas.height = height;

        ctx.drawImage(
            img,
            0,
            0,
            width,
            height
        );

        generateTextPortrait();

    }

    img.src = URL.createObjectURL(file);

});


/* ==========================================
   GENERADOR DEL RETRATO
   ========================================== */

function generateTextPortrait(){

    const imageData =
    ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const pixels = imageData.data;

    let minBrightness = 255;
    let maxBrightness = 0;

    for(let i = 0; i < pixels.length; i += 4){

        const brightness =
        (
            pixels[i] +
            pixels[i+1] +
            pixels[i+2]
        ) / 3;

        if(brightness < minBrightness){
            minBrightness = brightness;
        }

        if(brightness > maxBrightness){
            maxBrightness = brightness;
        }

    }

    let result = "";
    let textIndex = 0;

    for(let y = 0; y < canvas.height; y += 1){

        for(
            let x = 0;
            x < canvas.width;
            x++
        ){

            const index =
            (y * canvas.width + x) * 4;

            const r = pixels[index];
            const g = pixels[index + 1];
            const b = pixels[index + 2];

            let brightness =
            (r + g + b) / 3;

            const range =
            Math.max(
                1,
                maxBrightness - minBrightness
            );

            brightness =
            (
                brightness - minBrightness
            ) / range;

            brightness *= 255;

            if(brightness < 20){

    result += " ";

}
else if(brightness < 60){

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

    result += " ";

}
else if(brightness < 120){

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

}
else{

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

} 

        }

        result += "\n";

    }

    portrait.textContent = result;

}

</script>

</body>
</html>
