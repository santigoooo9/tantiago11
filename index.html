<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text Portrait Effect</title>

<style>

/* ==========================================
   CONFIGURACIÓN GENERAL
   ========================================== */

/*
    Quitamos márgenes por defecto
    y hacemos que todo ocupe la pantalla.
*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    color:white;
    font-family:monospace;

    display:flex;
    flex-direction:column;
    align-items:center;

    min-height:100vh;
    background:#000;
}


/* ==========================================
   BOTÓN PARA SUBIR IMAGEN
   ========================================== */

.controls{
    margin-top:20px;
    margin-bottom:20px;
}

/*
   Canvas oculto.
   Lo usamos para leer los píxeles
   de la imagen cargada.
*/

canvas{
    display:none;
}


/* ==========================================
   CONTENEDOR DEL TEXTO
   ========================================== */

#portraitContainer{

    position:fixed;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    background:black;

}

#canvas{

    display:none;

}

#portraitCanvas{

    width:100vw;

    height:100vh;

}

</style>

</head>

<body>

<!-- ==========================================
     INPUT DE IMAGEN
     ========================================== -->

<div class="controls">

    <!--
         Aquí el usuario selecciona una imagen.
    -->

    <input type="file" id="imageInput" accept="image/*">

</div>


<!--
     Canvas oculto para procesar la imagen
-->

<div id="portraitContainer">

    <canvas id="canvas"></canvas>

    <canvas id="portraitCanvas"></canvas>

</div>  


<script>

/* ==========================================
   ELEMENTOS DEL HTML
   ========================================== */

const imageInput = document.getElementById("imageInput");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const portraitCanvas =
document.getElementById("portraitCanvas");

const pctx =
portraitCanvas.getContext("2d");    

function resizePortraitCanvas(){

    portraitCanvas.width =
    window.innerWidth;

    portraitCanvas.height =
    window.innerHeight;

}

resizePortraitCanvas();

window.addEventListener(
    "resize",
    resizePortraitCanvas
);


/* ==========================================
   CARACTERES DISPONIBLES
   ========================================== */

/*
   Más densidad = más detalle.

   Los caracteres más "gruesos"
   representan zonas oscuras.

   Los espacios representan zonas claras.
*/

/* ==================================================
   TEXTO PERSONALIZADO
================================================== */

const CUSTOM_TEXT = `
dios TE AMAAAAAAAAAAAAAAAAAAAAAAAAA SI QUE SI 
`;


/* ==========================================
   AL CARGAR UNA IMAGEN
   ========================================== */

imageInput.addEventListener("change", function(event){

    const file = event.target.files[0];

    if(!file) return;

    const img = new Image();

    img.onload = function(){

        /*
            Reducimos tamaño para
            evitar millones de letras.
        */

        const width = 700;

        const height =
        img.height * (width / img.width);

        canvas.width = width;
        canvas.height = height;

        ctx.drawImage(
            img,
            0,
            0,
            width,
            height
        );

        generateTextPortrait();

    }

    img.src = URL.createObjectURL(file);

});


/* ==========================================
   GENERADOR DEL RETRATO
   ========================================== */

function generateTextPortrait(){

    const imageData =
    ctx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const pixels = imageData.data;

    let minBrightness = 255;
    let maxBrightness = 0;

    for(let i = 0; i < pixels.length; i += 4){

        const brightness =
        (
            pixels[i] +
            pixels[i+1] +
            pixels[i+2]
        ) / 3;

        if(brightness < minBrightness){
            minBrightness = brightness;
        }

        if(brightness > maxBrightness){
            maxBrightness = brightness;
        }

    }

    let result = "";
    let textIndex = 0;

    for(let y = 0; y < canvas.height; y += 1){

        for(
            let x = 0;
            x < canvas.width;
            x++
        ){

            const index =
            (y * canvas.width + x) * 4;

            const r = pixels[index];
            const g = pixels[index + 1];
            const b = pixels[index + 2];

            let brightness =
            (r + g + b) / 3;

            const range =
            Math.max(
                1,
                maxBrightness - minBrightness
            );

            brightness =
            (
                brightness - minBrightness
            ) / range;

            brightness *= 255;

            if(brightness < 20){

    result += " ";

}
else if(brightness < 60){

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

    result += " ";

}
else if(brightness < 120){

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

}
else{

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

    result +=
    CUSTOM_TEXT[
        textIndex++
        %
        CUSTOM_TEXT.length
    ];

} 

        }

        result += "\n";

    }
pctx.clearRect(
    0,
    0,
    portraitCanvas.width,
    portraitCanvas.height
);

pctx.textBaseline = "top";

let drawIndex = 0;

const scale =
Math.min(
    portraitCanvas.width / canvas.width,
    portraitCanvas.height / canvas.height
);

for(let y = 0; y < canvas.height; y += 4){

    for(let x = 0; x < canvas.width; x += 4){

        const index =
        (y * canvas.width + x) * 4;

        const r = pixels[index];
        const g = pixels[index + 1];
        const b = pixels[index + 2];

        const brightness =
        (r + g + b) / 3;

        if(brightness < 20){
            continue;
        }

        const letter =
        CUSTOM_TEXT[
            drawIndex++
            %
            CUSTOM_TEXT.length
        ];

        const px =
        x * scale;

        const py =
        y * scale;

        const shimmer =
        (
            Math.sin(
                Date.now()*0.003
                +
                x*0.05
            )
            +1
        ) * 0.5;

        pctx.fillStyle =
        `rgb(
            ${180 + shimmer*75},
            ${100 + shimmer*30},
            255
        )`;

        pctx.shadowColor =
        "#b266ff";

        pctx.shadowBlur =
        10;

        pctx.font =
        `${Math.max(5,scale*3)}px monospace`;

        pctx.fillText(
            letter,
            px,
            py
        );

    }

}

}

</script>

</body>
</html>
